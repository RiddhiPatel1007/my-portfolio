    <div class="section-contact">
        <div class="container">
            <h2 class="section-common-heading"> Contact Pages</h2>
            <p class="section-common-subheading"></p>
        </div>

        <div class="container grid grid-two--cols">
            <div class="contact-content">
                <form action="#">
                    <div class="grid  grid-two--cols mb-3">
                        <div>
                            <label for="username">username</label>
                            <input type="text" 
                            name="username" 
                            id="username" 
                            placeholder="enter your name"/>
                        </div>
                        <div>
                            <label for="email">enter your email</label>
                            <input type="email" name="email" id="email" 
                            autocomplete="off" required placeholder="abc@gmail.com"/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="subject">subject</label>
                        <input type="text" name="subject" id="subject" 
                        placeholder="your name title">

                    </div>

                    <div class="mb-3">
                        <label for="message" >masseage</label>
                        <textarea name="masseage" id="message" 
                        cols="30" rows="10" placeholder="enter your message">
                    </textarea>

                    </div>

                    <div>
                        <button type="submit" class="btn-submit"> send message</button>
                    </div>
                </form>
            </div>

            <div class="contact-map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3777315.023464486!2d68.6844967866807!3d22.39949126342835!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3959051f5f0ef795%3A0x861bd887ed54522e!2sGujarat!5e0!3m2!1sen!2sin!4v1780402000626!5m2!1sen!2sin"
